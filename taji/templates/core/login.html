{% extends 'base.html' %}
{% block title %}Login – Taji{% endblock %}
{% block content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon"><i class="bi bi-piggy-bank-fill"></i></div>
        <h2>Taji</h2>
        <p>Self Help Group</p>
    </div>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-taji w-100 mt-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
    </form>
    <div class="text-center mt-3">
        <small class="text-muted">New member? <a href="{% url 'register' %}" style="color:var(--taji-purple)">Register here</a></small>
    </div>
</div>
{% endblock %}
